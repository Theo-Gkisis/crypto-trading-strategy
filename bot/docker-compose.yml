services:
  trading-bot:
    build: .
    image: trading-bot:latest
    container_name: trading-bot
    restart: unless-stopped   

    env_file:
      - ../.env   

    volumes:
      - ./database:/app/database 
      - ./logs:/app/logs        

    logging:
      driver: "json-file"
      options:
        max-size: "10m"           
        max-file: "3"           

    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
