name: Build & Deploy Trading Bot

on:
  workflow_dispatch:

jobs:
  # ----------------------------------------------------------
  # JOB 1: TESTS
  # ----------------------------------------------------------
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r bot/requirements.txt

      - name: Run checks
        working-directory: bot
        run: |
          python -c "from config.settings import TRADING_PAIRS; print('Config OK')"
          python -c "from core.risk import RiskManager; print('Risk Manager OK')"
          python -c "from strategies.grid import GridStrategy; print('Grid OK')"
          python -c "from strategies.trend import TrendStrategy; print('Trend OK')"
          python -c "from strategies.dca import DCAStrategy; print('DCA OK')"
          python -c "from database.models import Database; print('Database OK')"

  # ----------------------------------------------------------
  # JOB 2: BUILD & PUSH TO DOCKER HUB
  # ----------------------------------------------------------
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push image
        uses: docker/build-push-action@v5
        with:
          context: ./bot
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/trading-strategy:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/trading-strategy:${{ github.sha }}

  # ----------------------------------------------------------
  # JOB 3: DEPLOY στο EC2
  # ----------------------------------------------------------
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ec2-user
          key:      ${{ secrets.EC2_SSH_KEY }}
          envs: TRADING_MODE
          script: |
            cd ~/AI-TRADING-BOT
            if [ -n "$TRADING_MODE" ]; then
              sed -i "s/TRADING_MODE=.*/TRADING_MODE=$TRADING_MODE/" .env
            fi
            docker compose pull
            docker compose up -d
            docker compose ps

      - name: Notify Telegram - Success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="Deploy success! New version is live." \
            -d parse_mode="HTML"

      - name: Notify Telegram - Failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="Deploy failed! Check GitHub Actions." \
            -d parse_mode="HTML"
