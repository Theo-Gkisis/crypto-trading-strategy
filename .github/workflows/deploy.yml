name: Build & Deploy Trading Bot

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ----------------------------------------------------------
  # JOB 1: TESTS
  # ----------------------------------------------------------
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run checks
        run: |
          python -c "from config.settings import TRADING_PAIRS; print('✅ Config OK')"
          python -c "from core.risk import RiskManager; print('✅ Risk Manager OK')"
          python -c "from strategies.grid import GridStrategy; print('✅ Grid OK')"
          python -c "from strategies.trend import TrendStrategy; print('✅ Trend OK')"
          python -c "from strategies.dca import DCAStrategy; print('✅ DCA OK')"
          python -c "from database.models import Database; print('✅ Database OK')"

  # ----------------------------------------------------------
  # JOB 2: BUILD & PUSH DOCKER IMAGE
  # ----------------------------------------------------------
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ----------------------------------------------------------
  # JOB 3: DEPLOY στο EC2
  # ----------------------------------------------------------
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ubuntu
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "=== Pulling new Docker image ==="
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/${{ github.repository }}:latest

            echo "=== Restarting bot ==="
            cd /home/ubuntu/AI-TRADING-BOT
            docker compose down
            docker compose up -d

            echo "=== Status ==="
            docker compose ps

      - name: Notify Telegram - Success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="🚀 Deploy επιτυχής!\n\nNew version is live ✅" \
            -d parse_mode="HTML"

      - name: Notify Telegram - Failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="❌ Deploy απέτυχε!\n\nΈλεγξε το GitHub Actions." \
            -d parse_mode="HTML"
